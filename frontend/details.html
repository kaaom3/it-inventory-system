<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Details · IT Inventory</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen p-4 md:p-10 flex justify-center items-start antialiased">

    <div class="ambient-bg"></div>

    <div class="max-w-5xl w-full relative group">
        <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 via-violet-500 to-emerald-500 rounded-[2.5rem] blur-md opacity-15 group-hover:opacity-30 transition duration-700"></div>

        <div class="relative glass-strong rounded-[2rem] overflow-hidden" id="app-content">

            <!-- Hero header -->
            <div class="relative p-8 md:p-10 text-white overflow-hidden"
                 style="background: var(--gradient-primary);">
                <div class="absolute -top-20 -right-20 w-72 h-72 rounded-full bg-white/10 blur-3xl"></div>
                <div class="absolute -bottom-20 -left-20 w-72 h-72 rounded-full bg-white/5 blur-3xl"></div>

                <div class="relative flex items-center justify-between gap-4">
                    <div class="flex items-center space-x-4">
                        <div class="w-14 h-14 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center border border-white/30">
                            <i class="fas fa-cube text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-[10px] font-black uppercase tracking-widest opacity-80">Technical Dossier</p>
                            <h1 class="text-2xl font-black tracking-tight">Asset Specification</h1>
                        </div>
                    </div>
                    <div class="flex gap-2 no-print">
                        <button onclick="window.history.back()"
                                class="w-11 h-11 flex items-center justify-center rounded-2xl bg-white/15 hover:bg-white/25 backdrop-blur-md border border-white/20 transition">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <button onclick="window.print()"
                                class="w-11 h-11 flex items-center justify-center rounded-2xl bg-white/15 hover:bg-white/25 backdrop-blur-md border border-white/20 transition">
                            <i class="fas fa-print"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="p-8 md:p-12">
                <!-- Loading -->
                <div class="text-center py-20" id="loading">
                    <div class="relative w-12 h-12 mx-auto mb-6">
                        <div class="absolute inset-0 border-4 border-indigo-100 dark:border-indigo-900/30 rounded-full"></div>
                        <div class="absolute inset-0 border-4 rounded-full border-t-transparent animate-spin"
                             style="border-color: var(--primary); border-top-color: transparent;"></div>
                    </div>
                    <p class="label-overline">Retrieving Data…</p>
                </div>

                <!-- Error -->
                <div id="error-state" class="hidden text-center py-20">
                    <div class="w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6"
                         style="background: linear-gradient(135deg,#fda4af,#f43f5e);">
                        <i class="fas fa-exclamation-triangle text-3xl text-white"></i>
                    </div>
                    <h2 class="text-2xl font-black mb-2 tracking-tight">Record Not Found</h2>
                    <p class="text-slate-500 dark:text-slate-400" id="error-msg">The asset may have been decommissioned.</p>
                    <button onclick="window.location.href='index.html'" class="mt-8 btn-ghost px-8 py-3">
                        Back to Dashboard
                    </button>
                </div>

                <!-- Detail -->
                <div id="detail-state" class="hidden">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6 pb-8 border-b border-slate-200/50 dark:border-slate-700/50">
                        <div class="min-w-0 flex-1">
                            <h2 class="text-3xl md:text-4xl font-black tracking-tight" id="asset-title">Unknown Asset</h2>
                            <div class="flex items-center mt-3 gap-3 flex-wrap">
                                <span class="px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest border"
                                      style="background: rgba(79,70,229,0.10); color: var(--primary); border-color: rgba(79,70,229,0.2);"
                                      id="asset-category">CATEGORY</span>
                                <span class="w-1 h-1 bg-slate-300 dark:bg-slate-700 rounded-full"></span>
                                <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">Internal Asset Registry</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="bg-white p-2 rounded-2xl shadow-lg" id="qr-wrap">
                                <canvas id="asset-qr"></canvas>
                            </div>
                            <span id="asset-status" class="status-badge status-active">Status</span>
                        </div>
                    </div>

                    <div class="mb-8">
                        <h3 class="label-overline mb-6 flex items-center">
                            <span class="w-7 h-7 rounded-lg flex items-center justify-center mr-3 text-white"
                                  style="background: var(--gradient-primary);">
                                <i class="fas fa-list-ul text-[10px]"></i>
                            </span>
                            Technical Specifications
                        </h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="fields-container"></div>
                    </div>

                    <div class="mt-12 pt-8 border-t border-slate-200/50 dark:border-slate-700/50 flex flex-wrap gap-3 justify-center no-print">
                        <button onclick="window.history.back()" class="btn-ghost px-6 py-3">
                            <i class="fas fa-arrow-left"></i> Go Back
                        </button>
                        <button onclick="window.location.href='loan.html'" class="btn-primary px-8 py-3">
                            <i class="fas fa-hand-holding-box"></i> Borrow this Item
                        </button>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="glass border-t border-slate-200/50 dark:border-slate-700/50 p-5 text-center">
                <p class="label-overline">Digital Asset Tag · Verified by IT Management</p>
            </div>
        </div>
    </div>

    <script>
      // Bootstrap dark mode
      if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');

      const API_BASE_URL = window.location.origin;

      document.addEventListener('DOMContentLoaded', async () => {
          const sn = new URLSearchParams(window.location.search).get('sn');
          if (!sn) return showError('No Serial Number provided');
          try {
              const res = await fetch(`${API_BASE_URL}/api/inventory/find/${sn}`);
              if (!res.ok) throw new Error('Asset not found');
              const data = await res.json();
              renderDetails(data.item, data.collectionName, sn);
          } catch (err) { showError(err.message); }
      });

      function showError(msg) {
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('error-state').classList.remove('hidden');
          document.getElementById('error-msg').textContent = msg;
      }

      function statusClass(s = '') {
          const k = s.toLowerCase();
          if (k.includes('active') || k.includes('loan')) return 'status-active';
          if (k.includes('storage')) return 'status-storage';
          if (k.includes('repair')) return 'status-repair';
          return 'status-damaged';
      }

      function renderDetails(item, collectionName, sn) {
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('detail-state').classList.remove('hidden');
          document.getElementById('asset-title').textContent =
              item.ComputerName || item.DeviceName || item.ItemName || item.Model || 'Asset';
          document.getElementById('asset-category').textContent = collectionName;

          const badge = document.getElementById('asset-status');
          badge.textContent = item.Status || '—';
          badge.className = 'status-badge ' + statusClass(item.Status);

          // QR
          QRCode.toCanvas(document.getElementById('asset-qr'), sn, { width: 88, margin: 0 });

          let html = '';
          Object.keys(item).forEach(key => {
              if (['_id', 'id', 'Status'].includes(key)) return;
              const v = item[key];
              if (v == null || v === '') return;
              html += `
                <div class="card-modern p-4">
                    <p class="label-overline mb-1">${key}</p>
                    <p class="text-sm font-bold break-words">${v}</p>
                </div>`;
          });
          document.getElementById('fields-container').innerHTML = html;
      }
    </script>
</body>
</html>
