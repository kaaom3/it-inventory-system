<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Details | IT Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen p-4 md:p-10 flex justify-center items-start antialiased font-sans relative overflow-hidden">
    <!-- Solid Geometric Background -->
    <div class="absolute top-0 left-0 w-full h-48 bg-slate-900 -z-10 border-b-4 border-blue-600"></div>

    <div class="max-w-4xl w-full relative">
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-[0_20px_60px_rgba(0,0,0,0.2)] overflow-hidden border-2 border-slate-200 dark:border-slate-800" id="app-content">
            
            <!-- Header -->
            <div class="bg-slate-900 p-10 text-white flex items-center justify-between border-b border-slate-800">
                <div class="flex items-center space-x-5">
                    <div class="w-14 h-14 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                        <i class="fas fa-barcode text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-3xl font-black tracking-tight uppercase">Technical Specifications</h1>
                        <p class="text-blue-400 text-[10px] font-black uppercase tracking-[0.3em]">Hardware Asset Registry</p>
                    </div>
                </div>
                <button onclick="window.print()" class="w-12 h-12 flex items-center justify-center rounded-xl bg-slate-800 hover:bg-slate-700 transition-all text-slate-300">
                    <i class="fas fa-print text-xl"></i>
                </button>
            </div>

            <div class="p-10 md:p-14">
                <!-- Loading State -->
                <div class="text-center py-20" id="loading">
                    <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                    <p class="text-slate-500 font-black uppercase tracking-[0.2em] text-[10px]">Verifying Data Integrity...</p>
                </div>

                <!-- Error State -->
                <div id="error-state" class="hidden text-center py-20">
                    <div class="w-24 h-24 bg-rose-100 dark:bg-rose-950/30 rounded-full flex items-center justify-center mx-auto mb-8 border-4 border-rose-200">
                        <i class="fas fa-database text-4xl text-rose-600"></i>
                    </div>
                    <h2 class="text-3xl font-black text-slate-900 dark:text-white mb-3 uppercase tracking-tight">Record Unreachable</h2>
                    <p class="text-slate-500 dark:text-slate-400 font-bold" id="error-msg">Identification tag does not match any current system entries.</p>
                    <button onclick="window.location.href='index.html'" class="mt-10 px-10 py-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-xl hover:opacity-90 font-black uppercase tracking-widest transition-all shadow-xl">
                        Terminate Session
                    </button>
                </div>

                <!-- Details State -->
                <div id="detail-state" class="hidden">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-8 pb-10 border-b-2 border-slate-100 dark:border-slate-800">
                        <div>
                            <h2 class="text-5xl font-black text-slate-900 dark:text-white tracking-tight uppercase" id="asset-title">Pending</h2>
                            <div class="flex items-center mt-4 space-x-4">
                                <span class="px-4 py-1.5 bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 text-[10px] font-black rounded-lg uppercase tracking-[0.2em] border border-blue-200 dark:border-blue-800" id="asset-category">SYSTEM_ENTRY</span>
                                <p class="text-xs text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest">Verified Infrastructure Asset</p>
                            </div>
                        </div>
                        <div class="flex flex-col items-end">
                            <span id="asset-status" class="px-8 py-3 inline-flex text-sm font-black rounded-xl shadow-xl uppercase tracking-[0.1em] border-2">
                                STATUS
                            </span>
                        </div>
                    </div>

                    <div class="mb-10">
                        <h3 class="text-xs font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.4em] mb-8 flex items-center">
                            <i class="fas fa-microchip mr-4 text-blue-600"></i>
                            Asset Matrix
                        </h3>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="fields-container">
                            <!-- Fields injected by JS -->
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="mt-14 pt-10 border-t-2 border-slate-100 dark:border-slate-800 flex flex-wrap gap-5 justify-center">
                        <button onclick="window.history.back()" class="px-8 py-4 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-xl font-black uppercase tracking-widest hover:bg-slate-200 transition-all flex items-center border-2 border-slate-200 dark:border-slate-700">
                            <i class="fas fa-arrow-left mr-3"></i> Return
                        </button>
                        <button onclick="window.location.href='loan.html'" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-xl font-black uppercase tracking-widest shadow-xl shadow-blue-500/20 transition-all flex items-center">
                            <i class="fas fa-hand-holding-box mr-3 text-xl"></i> Secure Loan
                        </button>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="bg-slate-50 dark:bg-slate-950 p-8 text-center border-t-2 border-slate-100 dark:border-slate-800">
                <p class="text-[10px] text-slate-400 font-black uppercase tracking-[0.5em]">Digital Asset Authenticated • System Core v4.0</p>
            </div>
        </div>
    </div>

    <script>
        // 🌟 แก้ไข: ให้ระบบดึง URL ของเซิร์ฟเวอร์แบบอัตโนมัติ ไม่ผูกติดกับพอร์ต 3000 อีกต่อไป
        const API_BASE_URL = window.location.origin;

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const sn = urlParams.get('sn');

            if (!sn) {
                showError('ไม่พบพารามิเตอร์หมายเลขซีเรียล (SN) ใน URL');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/inventory/find/${sn}`);
                if (!response.ok) throw new Error('ไม่พบข้อมูลอุปกรณ์นี้ในระบบฐานข้อมูล');
                
                const data = await response.json();
                renderDetails(data.item, data.collectionName);
            } catch (err) {
                showError(err.message);
            }
        });

        function showError(msg) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');
            document.getElementById('error-msg').textContent = msg;
        }

        function renderDetails(item, collectionName) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('detail-state').classList.remove('hidden');

            // Set Title & Category
            const title = item.ComputerName || item.DeviceName || item.ItemName || item.Name || item.PartName || item.Model || 'Unknown Asset';
            document.getElementById('asset-title').textContent = title;
            document.getElementById('asset-category').textContent = collectionName;

            // Set Status Badge Color
            const statusBadge = document.getElementById('asset-status');
            const status = item.Status || 'Unknown';
            statusBadge.textContent = status;
            
            let color = 'gray';
            if (status === 'Active') color = 'green';
            else if (status === 'On Loan') color = 'yellow';
            else if (status === 'Repair') color = 'orange';
            else if (status === 'Storage') color = 'blue';
            else if (status === 'Damaged') color = 'red';

            statusBadge.className = `px-4 py-1.5 inline-flex text-sm font-bold rounded-full bg-${color}-100 text-${color}-800 shadow-sm border border-${color}-200`;

            // Build Fields
            let html = '';
            
            // Prioritize specific fields to show first
            const prioritize = ['SerialNumber', 'MonitorSerial', 'Manufacturer', 'Model', 'UserName', 'Location', 'IPAddress', 'MacAddress'];
            const allKeys = Object.keys(item).filter(k => k !== '_id' && k !== 'id' && k !== 'Status' && k !== 'lastSeenOnline');
            
            // Sort keys: prioritized first, then others
            allKeys.sort((a, b) => {
                let idxA = prioritize.indexOf(a);
                let idxB = prioritize.indexOf(b);
                if (idxA === -1) idxA = 999;
                if (idxB === -1) idxB = 999;
                return idxA - idxB;
            });

            allKeys.forEach(key => {
                const value = item[key];
                if (value === null || value === undefined || value === '') return;

                let displayValue = value;
                // Format Timestamp/Dates if necessary
                if (typeof value === 'string' && value.match(/^\d{4}-\d{2}-\d{2}T/)) {
                    displayValue = new Date(value).toLocaleString('th-TH');
                }

                html += `
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 hover:shadow-md transition-shadow">
                        <p class="text-xs text-gray-500 font-bold uppercase tracking-wider mb-1">${key.replace(/([A-Z])/g, ' $1').trim()}</p>
                        <p class="text-sm font-semibold text-gray-900 break-words">${displayValue}</p>
                    </div>
                `;
            });

            document.getElementById('fields-container').innerHTML = html;
        }
    </script>
</body>
</html>
