<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Details | IT Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-slate-100 min-h-screen p-4 md:p-10 flex justify-center items-start antialiased relative overflow-hidden">
    <!-- Abstract Background -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-500/5 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-emerald-500/5 rounded-full blur-[120px]"></div>

    <div class="max-w-4xl w-full relative group">
        <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-emerald-500 rounded-[2.5rem] blur opacity-10"></div>
        <div class="relative bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-[2rem] shadow-2xl overflow-hidden border border-white/20 dark:border-slate-800/50" id="app-content">
            
            <!-- Header -->
            <div class="bg-indigo-600 p-8 text-white flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-xl flex items-center justify-center">
                        <i class="fas fa-cube text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black tracking-tight">Asset Specification</h1>
                        <p class="text-indigo-100 text-[10px] font-bold uppercase tracking-widest opacity-80">Technical Dossier</p>
                    </div>
                </div>
                <button onclick="window.print()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/10 hover:bg-white/20 transition-colors">
                    <i class="fas fa-print"></i>
                </button>
            </div>

            <div class="p-8 md:p-12">
                <!-- Loading State -->
                <div class="text-center py-20" id="loading">
                    <div class="relative w-12 h-12 mx-auto mb-6">
                        <div class="absolute inset-0 border-4 border-indigo-100 dark:border-indigo-900/30 rounded-full"></div>
                        <div class="absolute inset-0 border-4 border-indigo-600 rounded-full border-t-transparent animate-spin"></div>
                    </div>
                    <p class="text-slate-500 font-bold uppercase tracking-widest text-[10px]">Retrieving Data...</p>
                </div>

                <!-- Error State -->
                <div id="error-state" class="hidden text-center py-20">
                    <div class="w-20 h-20 bg-rose-50 dark:bg-rose-900/20 rounded-full flex items-center justify-center mx-auto mb-6">
                        <i class="fas fa-exclamation-triangle text-3xl text-rose-500"></i>
                    </div>
                    <h2 class="text-2xl font-black text-slate-800 dark:text-white mb-2 tracking-tight">Record Not Found</h2>
                    <p class="text-slate-500 dark:text-slate-400" id="error-msg">The asset may have been decommissioned or moved.</p>
                    <button onclick="window.location.href='index.html'" class="mt-8 px-8 py-3 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-700 font-bold transition-all shadow-sm">
                        Return to Control Center
                    </button>
                </div>

                <!-- Details State -->
                <div id="detail-state" class="hidden">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6 pb-8 border-b dark:border-slate-800">
                        <div>
                            <h2 class="text-4xl font-black text-slate-800 dark:text-white tracking-tight" id="asset-title">Unknown Asset</h2>
                            <div class="flex items-center mt-3 space-x-3">
                                <span class="px-3 py-1 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 text-[10px] font-black rounded-lg uppercase tracking-widest border border-indigo-100 dark:border-indigo-800" id="asset-category">CATEGORY</span>
                                <span class="w-1 h-1 bg-slate-300 dark:bg-slate-700 rounded-full"></span>
                                <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">Internal Asset Registry</p>
                            </div>
                        </div>
                        <div class="flex flex-col items-end">
                            <span id="asset-status" class="px-6 py-2 inline-flex text-xs font-black rounded-full shadow-lg transition-all transform hover:scale-105">
                                Status
                            </span>
                        </div>
                    </div>

                    <div class="mb-8">
                        <h3 class="text-xs font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em] mb-6 flex items-center">
                            <span class="w-8 h-8 bg-indigo-50 dark:bg-indigo-900/30 rounded-lg flex items-center justify-center text-indigo-500 mr-3">
                                <i class="fas fa-list-ul text-[10px]"></i>
                            </span>
                            Technical Specifications
                        </h3>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="fields-container">
                            <!-- Fields injected by JS -->
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="mt-12 pt-8 border-t dark:border-slate-800 flex flex-wrap gap-4 justify-center">
                        <button onclick="window.history.back()" class="px-6 py-3 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-xl font-bold hover:bg-slate-200 transition-all flex items-center">
                            <i class="fas fa-arrow-left mr-2"></i> Go Back
                        </button>
                        <button onclick="window.location.href='loan.html'" class="btn-primary px-8 py-3 flex items-center">
                            <i class="fas fa-hand-holding-box mr-2"></i> Borrow this Item
                        </button>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="bg-slate-50/50 dark:bg-slate-800/30 p-6 text-center border-t dark:border-slate-800">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Digital Asset Tag • Verified by IT Management System</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;

        document.addEventListener('DOMContentLoaded', async () => {
            const sn = new URLSearchParams(window.location.search).get('sn');
            if (!sn) return showError('No Serial Number provided');
            try {
                const res = await fetch(`${API_BASE_URL}/api/inventory/find/${sn}`);
                const data = await res.json();
                renderDetails(data.item, data.collectionName);
            } catch (err) { showError(err.message); }
        });

        function showError(msg) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');
            document.getElementById('error-msg').textContent = msg;
        }

        function renderDetails(item, collectionName) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('detail-state').classList.remove('hidden');
            document.getElementById('asset-title').textContent = item.ComputerName || item.DeviceName || item.ItemName || 'Asset';
            document.getElementById('asset-category').textContent = collectionName;
            const statusBadge = document.getElementById('asset-status');
            statusBadge.textContent = item.Status;
            
            let html = '';
            Object.keys(item).forEach(key => {
                if (['_id', 'id', 'Status'].includes(key)) return;
                html += `<div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border dark:border-slate-700/50">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">${key}</p>
                    <p class="text-sm font-semibold">${item[key]}</p>
                </div>`;
            });
            document.getElementById('fields-container').innerHTML = html;
        }
    </script>
</body>
</html>
