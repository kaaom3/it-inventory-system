<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <title>Device Loan System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { indigo: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' } }
                }
            }
        }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .modal { transition: opacity 0.3s ease; }
    .modal-content { transition: all 0.3s ease; }
    .modal.opacity-0 .modal-content { transform: scale(0.95); }
    #qr-reader { border: 2px solid #e5e7eb; }
    .dark #qr-reader { border-color: #4b5563; }
    
    /* Modern Pill Tabs */
    .tab-button { transition: all 0.2s ease-in-out; border-bottom: 2px solid transparent; }
    .tab-button.active { border-bottom-color: #4f46e5; color: #4f46e5; background-color: transparent; font-weight: bold;}
    .dark .tab-button.active { border-bottom-color: #818cf8; color: #818cf8; }
    
    .device-card { transition: all 0.2s ease; }
    .device-card.selected { border-color: #4f46e5; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.1), 0 2px 4px -1px rgba(79, 70, 229, 0.06); background-color: #e0e7ff; }
    .dark .device-card.selected { background-color: rgba(79, 70, 229, 0.2); border-color: #6366f1; }
    .device-card.selected .selected-icon { opacity: 1; transform: scale(1); }
    .selected-icon { opacity: 0; transform: scale(0.5); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-slate-100 transition-colors duration-300 min-h-screen flex flex-col antialiased">
    <!-- Header -->
    <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b dark:border-slate-800 p-4 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-xl shadow-indigo-200 dark:shadow-none">
                    <i class="fas fa-hand-holding-box text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-800 dark:text-white tracking-tight">Borrow Assets</h1>
                    <p class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest">Self-Service Portal</p>
                </div>
            </div>
            <button id="theme-toggle-btn" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 transition-all hover:bg-slate-200 dark:hover:bg-slate-700">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 p-6 md:p-10 max-w-7xl mx-auto w-full">
      
      <!-- Loading State -->
      <div id="loading-state" class="flex flex-col items-center justify-center py-32">
          <div class="relative w-16 h-16 mb-6">
              <div class="absolute inset-0 border-4 border-indigo-100 dark:border-indigo-900/30 rounded-full"></div>
              <div class="absolute inset-0 border-4 border-indigo-600 rounded-full border-t-transparent animate-spin"></div>
          </div>
          <p class="text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest text-xs">Connecting to Vault...</p>
      </div>

      <div id="loan-page" class="page-content" style="display: none;">
        <div class="mb-10">
            <h2 class="text-3xl font-black text-slate-800 dark:text-white tracking-tight">Loan & Return</h2>
            <p class="text-slate-500 dark:text-slate-400 mt-1">Scan or select items you wish to borrow</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <!-- Left Column (Scan / Select) -->
            <div class="lg:col-span-8 flex flex-col space-y-6">
                
                <!-- Navigation Tabs -->
                <div class="bg-white dark:bg-slate-900 p-1.5 rounded-2xl shadow-sm border dark:border-slate-800 inline-flex self-start">
                    <button onclick="switchLoanTab('scan', this)" class="tab-button active px-6 py-2.5 rounded-xl text-sm font-bold flex items-center transition-all bg-indigo-600 text-white shadow-lg shadow-indigo-200 dark:shadow-none">
                        <i class="fas fa-qrcode mr-2 text-base"></i>QR Scanner
                    </button>
                    <button onclick="switchLoanTab('select', this)" class="tab-button px-6 py-2.5 rounded-xl text-sm font-bold flex items-center transition-all text-slate-500 hover:text-slate-800 dark:hover:text-slate-200">
                        <i class="fas fa-list-ul mr-2 text-base"></i>Browse Directory
                    </button>
                </div>

                <div class="relative min-h-[500px]">
                    <!-- Scan View -->
                    <div id="scan-view" class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border dark:border-slate-800 p-8 flex flex-col items-center justify-center h-full">
                        <div id="qr-reader" class="w-full max-w-sm mx-auto mb-8 rounded-2xl overflow-hidden shadow-2xl bg-slate-50 dark:bg-slate-800 border-4 border-white dark:border-slate-800 min-h-[300px] flex items-center justify-center">
                            <i class="fas fa-camera text-5xl text-slate-200 dark:text-slate-700" id="camera-placeholder"></i>
                        </div>
                        <button id="start-scan-button" onclick="startScanning()" class="btn-primary px-10 py-4 flex items-center">
                            <i class="fas fa-camera mr-2"></i> Activate Scanner
                        </button>
                        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-6">Point your camera at the device label</p>
                    </div>

                    <!-- Select View -->
                    <div id="select-view" class="hidden h-full flex flex-col">
                        <div id="category-selection" class="flex-1"></div>
                        <div id="device-list-view" class="hidden flex-1 flex flex-col">
                            <div class="flex items-center mb-6">
                                <button onclick="showCategorySelection()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white dark:bg-slate-800 border dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all shadow-sm">
                                    <i class="fas fa-arrow-left"></i>
                                </button>
                                <h3 id="current-category-title" class="ml-4 text-xl font-black text-slate-800 dark:text-white tracking-tight"></h3>
                            </div>
                            <div id="device-list-container" class="flex-1 overflow-y-auto pr-2 pb-4 grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column (Cart & Form) -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl border dark:border-slate-800 p-8 flex flex-col sticky top-24">
                    <h3 class="text-xl font-black mb-6 text-slate-800 dark:text-white flex items-center">
                        <span class="w-10 h-10 bg-indigo-50 dark:bg-indigo-900/30 rounded-xl flex items-center justify-center text-indigo-600 mr-4">
                            <i class="fas fa-shopping-basket"></i>
                        </span>
                        Basket
                    </h3>
                    
                    <div id="cart" class="flex-1 overflow-y-auto space-y-3 border-2 border-dashed border-slate-100 dark:border-slate-800 p-4 rounded-2xl min-h-[120px] bg-slate-50/50 dark:bg-slate-800/20 mb-8 custom-scrollbar">
                        <div class="h-full flex flex-col items-center justify-center text-slate-400 py-6">
                            <i class="fas fa-box-open text-4xl mb-3 opacity-20"></i>
                            <p class="text-[10px] font-black uppercase tracking-widest">Basket is empty</p>
                        </div>
                    </div>
                    
                    <form id="loanForm" class="space-y-6">
                        <div>
                            <label class="block text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">Borrower Name <span class="text-rose-500">*</span></label>
                            <input type="text" id="borrowerName" required placeholder="e.g. john.doe" 
                                class="input-modern w-full">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">Return Due Date <span class="text-rose-500">*</span></label>
                            <input type="date" id="dueDate" required 
                                class="input-modern w-full">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">Notes</label>
                            <textarea id="loanNotes" rows="2" placeholder="Purpose of loan..." 
                                class="input-modern w-full"></textarea>
                        </div>
                        <button type="button" onclick="submitLoan()" class="btn-primary w-full py-4 mt-2">
                            Confirm Loan <i class="fas fa-check-circle ml-2"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
      </div>
    </main>

  <!-- Receipt Modal Update -->
  <div id="receiptModal" class="modal pointer-events-none fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 opacity-0 p-6 backdrop-blur-md transition-all duration-300">
      <div class="modal-content bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl p-10 w-full max-w-md text-center transform scale-90 transition-all duration-300 border dark:border-slate-800">
          <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-3xl bg-emerald-50 dark:bg-emerald-900/30 mb-6 shadow-lg shadow-emerald-100 dark:shadow-none">
              <i class="fas fa-check text-3xl text-emerald-600"></i>
          </div>
          <h3 class="text-3xl font-black text-slate-800 dark:text-white mb-2 tracking-tight">Success!</h3>
          <p class="text-slate-500 dark:text-slate-400 mb-8 text-sm font-medium">Please save this receipt for returns</p>
          
          <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100 mb-8 inline-block">
              <canvas id="receiptQrCanvas"></canvas>
          </div>
          
          <div id="receiptDetails" class="text-left text-sm bg-slate-50 dark:bg-slate-800/50 p-6 rounded-2xl border dark:border-slate-700/50"></div>
          
          <button onclick="closeReceiptModal()" class="mt-8 btn-primary w-full py-4 shadow-xl">Done</button>
      </div>
  </div>

  <script>
    const API_BASE_URL = window.location.origin;
    let allData = {};
    let cartItems = [];
    let html5QrCode;
    let collectionConfigs = {
        Computers: { displayName: 'Computers', nameField: 'ComputerName', serialField: 'SerialNumber', icon: 'fa-laptop' },
        Network: { displayName: 'Network', nameField: 'DeviceName', serialField: 'SerialNumber', icon: 'fa-network-wired' },
        Monitors: { displayName: 'Monitors', nameField: 'Model', serialField: 'MonitorSerial', icon: 'fa-desktop' },
        Accessory: { displayName: 'Accessories', nameField: 'Model', serialField: 'SerialNumber', icon: 'fa-keyboard' },
        Printers: { displayName: 'Printers', nameField: 'Name', serialField: 'SerialNumber', icon: 'fa-print' }
    };
    
    async function apiRequest(endpoint, method = 'GET', body = null) {
        const headers = { 'Content-Type': 'application/json' };
        const token = localStorage.getItem('authToken');
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const config = { method, headers };
        if (body) config.body = JSON.stringify(body);
        try {
            const response = await fetch(`${API_BASE_URL}${endpoint}`, config);
            if (!response.ok) throw new Error(`API failed: ${response.status}`);
            return response.status === 204 ? null : await response.json();
        } catch (error) { throw error; }
    }

    window.hideModal = (id) => {
        document.getElementById(id).classList.add('opacity-0', 'pointer-events-none');
    };
    window.openModal = (id) => {
        document.getElementById(id).classList.remove('opacity-0', 'pointer-events-none');
    };

    window.switchLoanTab = (tabName, btn) => {
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('scan-view').style.display = tabName === 'scan' ? 'flex' : 'none';
        document.getElementById('select-view').style.display = tabName === 'select' ? 'flex' : 'none';
    };

    function populateCategories() {
        const container = document.getElementById('category-selection');
        let html = '<div class="grid grid-cols-2 md:grid-cols-4 gap-4">';
        Object.keys(allData).forEach(key => {
            if (['Staff', 'admins', 'CustomMenus', 'TransactionHistory'].includes(key)) return;
            const config = collectionConfigs[key] || { icon: 'fa-box' };
            html += `<div class="card-modern p-6 text-center cursor-pointer hover:bg-indigo-50 dark:hover:bg-indigo-900/20" onclick="showDeviceCategory('${key}')">
                <i class="fas ${config.icon} text-3xl text-indigo-500 mb-3"></i>
                <p class="font-bold">${key}</p>
            </div>`;
        });
        container.innerHTML = html + '</div>';
    }

    window.showDeviceCategory = (key) => {
        document.getElementById('category-selection').style.display = 'none';
        document.getElementById('device-list-view').style.display = 'block';
        document.getElementById('current-category-title').innerText = key;
        const container = document.getElementById('device-list-container');
        const items = allData[key].filter(i => i.Status === 'Storage');
        let html = '';
        items.forEach(item => {
            html += `<div class="card-modern p-4 cursor-pointer" onclick="addDeviceToCart('${key}', '${item.id}')">
                <p class="font-bold">${item.ComputerName || item.ItemName || item.SerialNumber}</p>
                <p class="text-xs text-slate-500">${item.SerialNumber}</p>
            </div>`;
        });
        container.innerHTML = html || '<p>No available items</p>';
    };

    window.showCategorySelection = () => {
        document.getElementById('category-selection').style.display = 'block';
        document.getElementById('device-list-view').style.display = 'none';
    };

    window.addDeviceToCart = (col, id) => {
        const item = allData[col].find(i => i.id === id);
        if (item && !cartItems.some(c => c.id === id)) {
            cartItems.push({...item, collection: col});
            renderCart();
        }
    };

    function renderCart() {
        const container = document.getElementById('cart');
        if (cartItems.length === 0) { container.innerHTML = '<p class="text-center text-slate-400">Empty</p>'; return; }
        container.innerHTML = cartItems.map((item, i) => `
            <div class="flex justify-between items-center p-2 bg-slate-50 dark:bg-slate-800 rounded">
                <span class="text-sm font-bold truncate">${item.SerialNumber}</span>
                <button onclick="removeFromCart(${i})" class="text-rose-500"><i class="fas fa-trash"></i></button>
            </div>
        `).join('');
    }

    window.removeFromCart = (i) => { cartItems.splice(i, 1); renderCart(); };

    window.submitLoan = async () => {
        const borrowerName = document.getElementById('borrowerName').value;
        const dueDate = document.getElementById('dueDate').value;
        if (!borrowerName || !dueDate || cartItems.length === 0) return alert('Fill all fields');
        try {
            const res = await apiRequest('/api/loans/submit', 'POST', {
                borrowerName, dueDate, items: cartItems.map(i => ({ deviceId: i.id, deviceSerial: i.SerialNumber, deviceType: i.collection }))
            });
            showLoanReceipt(res.loanGroupId, { borrowerName, dueDate, items: cartItems });
            cartItems = []; renderCart();
        } catch (e) { alert(e.message); }
    };

    function showLoanReceipt(id, details) {
        QRCode.toCanvas(document.getElementById('receiptQrCanvas'), `${window.location.origin}/return.html?id=${id}`);
        document.getElementById('receiptDetails').innerHTML = `<p>ID: ${id}</p><p>Name: ${details.borrowerName}</p>`;
        openModal('receiptModal');
    }

    window.closeReceiptModal = () => hideModal('receiptModal');

    window.addEventListener('load', async () => {
        try {
            const data = await apiRequest('/api/public/loanable-items');
            for(let k in data) allData[k] = data[k].map(i => ({...i, id: i._id}));
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('loan-page').style.display = 'block';
            populateCategories();
        } catch(e) { console.error(e); }
    });

    // Theme Toggle
    document.getElementById('theme-toggle').addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
    });
  </script>
</body>
</html>
