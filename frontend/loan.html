<!DOCTYPE html>
<html lang="th">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borrow Assets · IT Inventory</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <link rel="stylesheet" href="style.css">
    <style>
        #qr-reader { border-radius: 1.5rem; overflow: hidden; }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased">

    <div class="ambient-bg"></div>

    <!-- Header -->
    <header class="glass border-b border-slate-200/50 dark:border-slate-800/50 p-4 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 rounded-2xl flex items-center justify-center text-white shadow-glow"
                     style="background: var(--gradient-primary);">
                    <i class="fas fa-hand-holding-box text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-tight">Borrow Assets</h1>
                    <p class="label-overline text-[9px]">Self-Service Portal</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="window.location.href='index.html'"
                        class="btn-ghost h-11 hidden sm:inline-flex">
                    <i class="fas fa-home text-xs"></i>
                    <span>Dashboard</span>
                </button>
                <button id="theme-toggle" class="w-11 h-11 flex items-center justify-center rounded-2xl glass text-slate-600 dark:text-slate-300">
                    <i id="theme-toggle-dark-icon" class="fas fa-moon"></i>
                    <i id="theme-toggle-light-icon" class="fas fa-sun text-amber-400 hidden"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 p-4 md:p-10 max-w-7xl mx-auto w-full">

        <!-- Loading -->
        <div id="loading-state" class="flex flex-col items-center justify-center py-32">
            <div class="relative w-16 h-16 mb-6">
                <div class="absolute inset-0 border-4 border-indigo-100 dark:border-indigo-900/30 rounded-full"></div>
                <div class="absolute inset-0 border-4 rounded-full border-t-transparent animate-spin"
                     style="border-color: var(--primary); border-top-color: transparent;"></div>
            </div>
            <p class="label-overline">Connecting to Vault…</p>
        </div>

        <div id="loan-page" class="page-content" style="display:none;">
            <!-- Page header -->
            <div class="mb-8">
                <p class="label-overline mb-2">New Handover</p>
                <h2 class="text-3xl md:text-4xl font-black tracking-tight">Loan &amp; Return</h2>
                <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Scan or select items you wish to borrow</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

                <!-- Left -->
                <div class="lg:col-span-8 flex flex-col space-y-6">
                    <!-- Tabs -->
                    <div class="glass-strong p-1.5 rounded-2xl inline-flex self-start gap-1">
                        <button onclick="switchLoanTab('scan', this)" class="tab-button active">
                            <i class="fas fa-qrcode"></i> QR Scanner
                        </button>
                        <button onclick="switchLoanTab('select', this)" class="tab-button">
                            <i class="fas fa-list-ul"></i> Browse Directory
                        </button>
                    </div>

                    <div class="relative min-h-[500px]">
                        <!-- Scan -->
                        <div id="scan-view" class="card-modern p-8 flex flex-col items-center justify-center h-full">
                            <div id="qr-reader" class="w-full max-w-sm mx-auto mb-8 bg-slate-50 dark:bg-slate-800 min-h-[300px] flex items-center justify-center border-4 border-white dark:border-slate-700 shadow-2xl">
                                <i class="fas fa-camera text-6xl text-slate-200 dark:text-slate-700" id="camera-placeholder"></i>
                            </div>
                            <button id="start-scan-button" onclick="startScanning()" class="btn-primary px-10 py-4">
                                <i class="fas fa-camera"></i> Activate Scanner
                            </button>
                            <p class="label-overline mt-6">Point your camera at the device label</p>
                        </div>

                        <!-- Select -->
                        <div id="select-view" class="hidden h-full flex-col">
                            <div id="category-selection" class="flex-1"></div>
                            <div id="device-list-view" class="hidden flex-1 flex flex-col">
                                <div class="flex items-center mb-6">
                                    <button onclick="showCategorySelection()"
                                            class="w-11 h-11 flex items-center justify-center rounded-xl glass text-slate-600 dark:text-slate-300 hover:scale-105 transition">
                                        <i class="fas fa-arrow-left"></i>
                                    </button>
                                    <h3 id="current-category-title" class="ml-4 text-xl font-black tracking-tight"></h3>
                                </div>
                                <div id="device-list-container" class="flex-1 overflow-y-auto pr-2 pb-4 grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right · Cart -->
                <div class="lg:col-span-4 space-y-6">
                    <div class="card-modern p-7 flex flex-col sticky top-24">
                        <h3 class="text-lg font-black mb-6 flex items-center">
                            <span class="w-10 h-10 rounded-xl flex items-center justify-center text-white mr-3"
                                  style="background: var(--gradient-primary);">
                                <i class="fas fa-shopping-basket text-sm"></i>
                            </span>
                            Basket
                        </h3>

                        <div id="cart" class="flex-1 overflow-y-auto space-y-2 border-2 border-dashed border-slate-200 dark:border-slate-700 p-3 rounded-2xl min-h-[120px] bg-slate-50/40 dark:bg-slate-800/20 mb-6">
                            <div class="h-full flex flex-col items-center justify-center text-slate-400 py-6">
                                <i class="fas fa-box-open text-4xl mb-3 opacity-30"></i>
                                <p class="label-overline">Basket is empty</p>
                            </div>
                        </div>

                        <form id="loanForm" class="space-y-4">
                            <div>
                                <label class="label-overline block mb-2">Borrower Name <span class="text-rose-500">*</span></label>
                                <input type="text" id="borrowerName" required placeholder="e.g. john.doe" class="input-modern">
                            </div>
                            <div>
                                <label class="label-overline block mb-2">Return Due Date <span class="text-rose-500">*</span></label>
                                <input type="date" id="dueDate" required class="input-modern">
                            </div>
                            <div>
                                <label class="label-overline block mb-2">Notes</label>
                                <textarea id="loanNotes" rows="2" placeholder="Purpose of loan…" class="input-modern"></textarea>
                            </div>
                            <button type="button" onclick="submitLoan()" class="btn-primary w-full py-4 mt-2">
                                Confirm Loan <i class="fas fa-check-circle"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Receipt Modal -->
    <div id="receiptModal" class="modal pointer-events-none fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 opacity-0 p-6 transition-all duration-300">
        <div class="modal-content glass-strong p-10 w-full max-w-md text-center">
            <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-3xl mb-6"
                 style="background: linear-gradient(135deg,#10b981,#059669); box-shadow: 0 16px 40px -10px rgba(16,185,129,0.5);">
                <i class="fas fa-check text-3xl text-white"></i>
            </div>
            <h3 class="text-3xl font-black mb-2 tracking-tight">Success!</h3>
            <p class="text-slate-500 dark:text-slate-400 mb-8 text-sm">Please save this receipt for returns</p>

            <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100 mb-6 inline-block">
                <canvas id="receiptQrCanvas"></canvas>
            </div>

            <div id="receiptDetails" class="text-left text-sm glass rounded-2xl p-5"></div>

            <button onclick="closeReceiptModal()" class="mt-6 btn-primary w-full py-4">Done</button>
        </div>
    </div>

    <script>
      // ===== Theme bootstrap =====
      const root = document.documentElement;
      const dIco = document.getElementById('theme-toggle-dark-icon');
      const lIco = document.getElementById('theme-toggle-light-icon');
      const setTheme = (t) => {
          root.classList.toggle('dark', t === 'dark');
          dIco.classList.toggle('hidden', t === 'dark');
          lIco.classList.toggle('hidden', t !== 'dark');
          localStorage.setItem('theme', t);
      };
      setTheme(localStorage.getItem('theme') || 'light');
      document.getElementById('theme-toggle').addEventListener('click', () =>
          setTheme(root.classList.contains('dark') ? 'light' : 'dark'));
    </script>

    <script>
      // ===== Loan logic (kept identical to original) =====
      const API_BASE_URL = window.location.origin;
      let allData = {};
      let cartItems = [];
      let html5QrCode;
      const collectionConfigs = {
          Computers: { displayName: 'Computers', nameField: 'ComputerName', serialField: 'SerialNumber', icon: 'fa-laptop' },
          Network:   { displayName: 'Network',   nameField: 'DeviceName',   serialField: 'SerialNumber', icon: 'fa-network-wired' },
          Monitors:  { displayName: 'Monitors',  nameField: 'Model',        serialField: 'MonitorSerial', icon: 'fa-desktop' },
          Accessory: { displayName: 'Accessories', nameField: 'Model',      serialField: 'SerialNumber', icon: 'fa-keyboard' },
          Printers:  { displayName: 'Printers',  nameField: 'Name',         serialField: 'SerialNumber', icon: 'fa-print' }
      };

      async function apiRequest(endpoint, method = 'GET', body = null) {
          const headers = { 'Content-Type': 'application/json' };
          const token = localStorage.getItem('authToken');
          if (token) headers['Authorization'] = `Bearer ${token}`;
          const config = { method, headers };
          if (body) config.body = JSON.stringify(body);
          const response = await fetch(`${API_BASE_URL}${endpoint}`, config);
          if (!response.ok) throw new Error(`API failed: ${response.status}`);
          return response.status === 204 ? null : await response.json();
      }

      window.hideModal = (id) => document.getElementById(id).classList.add('opacity-0', 'pointer-events-none');
      window.openModal = (id) => document.getElementById(id).classList.remove('opacity-0', 'pointer-events-none');

      window.switchLoanTab = (tabName, btn) => {
          document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('scan-view').style.display   = tabName === 'scan' ? 'flex' : 'none';
          document.getElementById('select-view').style.display = tabName === 'select' ? 'flex' : 'none';
      };

      function populateCategories() {
          const container = document.getElementById('category-selection');
          let html = '<div class="grid grid-cols-2 md:grid-cols-4 gap-4">';
          Object.keys(allData).forEach(key => {
              if (['Staff', 'admins', 'CustomMenus', 'TransactionHistory'].includes(key)) return;
              const config = collectionConfigs[key] || { icon: 'fa-box' };
              html += `
                <div class="card-modern p-6 text-center cursor-pointer group" onclick="showDeviceCategory('${key}')">
                    <div class="w-14 h-14 mx-auto rounded-2xl flex items-center justify-center text-white mb-3 group-hover:scale-110 transition-transform"
                         style="background: var(--gradient-primary);">
                        <i class="fas ${config.icon} text-xl"></i>
                    </div>
                    <p class="font-black text-sm">${key}</p>
                    <p class="text-xs text-slate-500 mt-1">${(allData[key]||[]).length} items</p>
                </div>`;
          });
          container.innerHTML = html + '</div>';
      }

      window.showDeviceCategory = (key) => {
          document.getElementById('category-selection').style.display = 'none';
          document.getElementById('device-list-view').style.display = 'flex';
          document.getElementById('current-category-title').innerText = key;
          const container = document.getElementById('device-list-container');
          const items = (allData[key] || []).filter(i => (i.Status || '').toLowerCase() === 'storage');
          if (items.length === 0) {
              container.innerHTML = `<div class="col-span-full text-center py-10 label-overline">No available items</div>`;
              return;
          }
          container.innerHTML = items.map(item => `
              <div class="device-card" onclick="addDeviceToCart('${key}', '${item.id}'); this.classList.add('selected');">
                  <div class="flex justify-between items-start gap-3">
                      <div class="min-w-0">
                          <p class="font-black text-sm truncate">${item.ComputerName || item.ItemName || item.Model || item.DeviceName || item.SerialNumber}</p>
                          <p class="text-[11px] text-slate-500 mt-1 font-mono truncate">${item.SerialNumber || ''}</p>
                      </div>
                      <span class="selected-icon w-8 h-8 rounded-full flex items-center justify-center text-white shrink-0"
                            style="background: var(--gradient-primary);">
                          <i class="fas fa-check text-xs"></i>
                      </span>
                  </div>
              </div>`).join('');
      };

      window.showCategorySelection = () => {
          document.getElementById('category-selection').style.display = 'block';
          document.getElementById('device-list-view').style.display = 'none';
      };

      window.addDeviceToCart = (col, id) => {
          const item = (allData[col] || []).find(i => i.id === id);
          if (item && !cartItems.some(c => c.id === id)) {
              cartItems.push({ ...item, collection: col });
              renderCart();
          }
      };

      function renderCart() {
          const container = document.getElementById('cart');
          if (cartItems.length === 0) {
              container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-slate-400 py-6">
                  <i class="fas fa-box-open text-4xl mb-3 opacity-30"></i>
                  <p class="label-overline">Basket is empty</p>
              </div>`;
              return;
          }
          container.innerHTML = cartItems.map((item, i) => `
              <div class="flex justify-between items-center p-3 glass rounded-xl">
                  <div class="min-w-0">
                      <p class="text-sm font-bold truncate">${item.ComputerName || item.ItemName || item.Model || item.DeviceName || item.SerialNumber}</p>
                      <p class="text-[10px] font-mono text-slate-500 truncate">${item.SerialNumber || ''}</p>
                  </div>
                  <button onclick="removeFromCart(${i})" class="w-8 h-8 flex items-center justify-center rounded-lg text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/20">
                      <i class="fas fa-trash text-xs"></i>
                  </button>
              </div>`).join('');
      }

      window.removeFromCart = (i) => { cartItems.splice(i, 1); renderCart(); };

      window.submitLoan = async () => {
          const borrowerName = document.getElementById('borrowerName').value;
          const dueDate      = document.getElementById('dueDate').value;
          if (!borrowerName || !dueDate || cartItems.length === 0) return alert('Fill all fields');
          try {
              const res = await apiRequest('/api/loans/submit', 'POST', {
                  borrowerName, dueDate,
                  items: cartItems.map(i => ({ deviceId: i.id, deviceSerial: i.SerialNumber, deviceType: i.collection }))
              });
              showLoanReceipt(res.loanGroupId, { borrowerName, dueDate, items: cartItems });
              cartItems = []; renderCart();
          } catch (e) { alert(e.message); }
      };

      function showLoanReceipt(id, details) {
          QRCode.toCanvas(document.getElementById('receiptQrCanvas'),
              `${window.location.origin}/return.html?id=${id}`, { width: 180 });
          document.getElementById('receiptDetails').innerHTML = `
              <p class="label-overline mb-1">Loan ID</p>
              <p class="font-mono text-sm font-bold mb-3">${id}</p>
              <p class="label-overline mb-1">Borrower</p>
              <p class="text-sm font-bold mb-3">${details.borrowerName}</p>
              <p class="label-overline mb-1">Items</p>
              <p class="text-sm font-bold">${details.items.length} device(s)</p>`;
          openModal('receiptModal');
      }

      window.closeReceiptModal = () => hideModal('receiptModal');

      window.startScanning = async () => {
          if (!html5QrCode) html5QrCode = new Html5Qrcode('qr-reader');
          try {
              await html5QrCode.start({ facingMode: 'environment' }, { fps: 10, qrbox: 250 },
                  (decodedText) => {
                      // SerialNumber is encoded into QR
                      for (const col of Object.keys(allData)) {
                          const item = (allData[col] || []).find(i => i.SerialNumber === decodedText);
                          if (item) { addDeviceToCart(col, item.id); break; }
                      }
                  });
              document.getElementById('camera-placeholder')?.remove();
          } catch (e) { alert('Camera error: ' + e.message); }
      };

      window.addEventListener('load', async () => {
          try {
              allData = await apiRequest('/api/inventory/all');
              document.getElementById('loading-state').style.display = 'none';
              const page = document.getElementById('loan-page');
              page.style.display = 'block';
              page.classList.add('active');
              populateCategories();
          } catch (e) {
              document.getElementById('loading-state').innerHTML =
                  `<div class="text-center"><p class="text-rose-500 font-bold">${e.message}</p></div>`;
          }
      });
    </script>
</body>
</html>
