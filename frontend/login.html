<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <title>Login - Inventory System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased font-sans">
    <div class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
        <!-- Defined Shapes Background -->
        <div class="absolute top-0 right-0 w-1/3 h-full bg-blue-600/5 -skew-x-12 transform origin-top shadow-inner"></div>
        <div class="absolute bottom-0 left-0 w-1/4 h-1/2 bg-blue-500/5 skew-x-12 transform origin-bottom shadow-inner"></div>

        <div class="max-w-md w-full relative">
            <div class="bg-white dark:bg-slate-900 p-10 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] border-2 border-slate-200 dark:border-slate-800">
                
                <div class="text-center mb-10">
                    <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-600 rounded-xl shadow-lg mb-6">
                        <i class="fas fa-cubes text-3xl text-white"></i>
                    </div>
                    <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight uppercase">Inventory</h1>
                    <p class="text-slate-500 dark:text-slate-400 mt-2 font-bold tracking-widest text-xs">OPERATOR TERMINAL</p>
                </div>
                
                <form id="loginForm" class="space-y-6">
                    <div>
                        <label for="email" class="block text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-[0.2em] mb-2 ml-1">Secure Email</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-envelope text-slate-400 text-sm"></i>
                            </div>
                            <input type="email" id="email" name="email" required 
                                class="block w-full pl-11 pr-4 py-4 bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white text-sm rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-600 transition-all outline-none font-medium"
                                placeholder="name@organization.com">
                        </div>
                    </div>
                    
                    <div>
                        <div class="flex justify-between items-center mb-2 ml-1">
                            <label for="password" class="block text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-[0.2em]">Keycode</label>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-slate-400 text-sm"></i>
                            </div>
                            <input type="password" id="password" name="password" required 
                                class="block w-full pl-11 pr-4 py-4 bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white text-sm rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-600 transition-all outline-none font-medium"
                                placeholder="••••••••">
                        </div>
                    </div>
                    
                    <div id="errorMessage" class="text-rose-600 text-xs font-black text-center h-5 uppercase tracking-tighter"></div>
                    
                    <button type="submit" id="loginButton" 
                        class="w-full flex justify-center items-center py-4 px-4 bg-blue-600 hover:bg-blue-700 text-white text-sm font-black rounded-xl shadow-xl hover:shadow-blue-500/20 focus:outline-none transition-all transform active:scale-[0.98] uppercase tracking-[0.2em]">
                        Establish Connection <i class="fas fa-arrow-right ml-3"></i>
                    </button>
                </form>

                <div class="mt-10 pt-8 border-t-2 border-slate-50 dark:border-slate-800 text-center">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                        Unauthorized access is prohibited
                    </p>
                </div>
            </div>
            
            <div class="mt-8 text-center">
                <p class="text-xs text-slate-500 font-medium">
                    Need assistance? <a href="#" class="text-blue-600 dark:text-blue-400 font-black hover:underline underline-offset-4">Technical Support</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        // 🌟 แก้ไข: ให้ระบบดึง URL ของเซิร์ฟเวอร์แบบอัตโนมัติ (รองรับ Render.com)
        const API_BASE_URL = window.location.origin;

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMessageDiv = document.getElementById('errorMessage');
        const loginButton = document.getElementById('loginButton');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessageDiv.textContent = '';
            loginButton.disabled = true;
            loginButton.innerHTML = 'Signing In...';

            const email = emailInput.value;
            const password = passwordInput.value;

            try {
                const response = await fetch(`${API_BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Login failed');
                }

                const { token, user } = await response.json();
                
                // Store token and user info in localStorage
                localStorage.setItem('authToken', token);
                localStorage.setItem('user', JSON.stringify(user));
                
                window.location.href = 'index.html'; // Redirect on success
            } catch (error) {
                errorMessageDiv.textContent = error.message;
                loginButton.disabled = false;
                loginButton.innerHTML = 'Sign In';
            }
        });
    </script>
</body>
</html>
