<!DOCTYPE html>
<html lang="th">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In · IT Inventory</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-6 antialiased">

    <div class="ambient-bg"></div>

    <!-- Theme toggle -->
    <button id="theme-toggle" class="no-print fixed top-6 right-6 w-11 h-11 flex items-center justify-center rounded-2xl glass text-slate-600 dark:text-slate-300 hover:scale-105 transition-transform">
        <i id="theme-icon" class="fas fa-moon"></i>
    </button>

    <div class="w-full max-w-md relative group">
        <!-- Glow border -->
        <div class="absolute -inset-0.5 bg-gradient-to-r from-indigo-500 via-violet-500 to-emerald-500 rounded-[2rem] blur-md opacity-30 group-hover:opacity-60 transition duration-700"></div>

        <div class="relative glass-strong p-10 rounded-[2rem]">
            <!-- Logo -->
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl mb-6 shadow-glow"
                     style="background: var(--gradient-primary);">
                    <i class="fas fa-cubes text-3xl text-white"></i>
                </div>
                <h1 class="text-3xl font-black tracking-tight text-slate-900 dark:text-white">
                    Welcome back
                </h1>
                <p class="text-sm text-slate-500 dark:text-slate-400 mt-2 font-medium">
                    Enterprise Asset Management Platform
                </p>
            </div>

            <form id="loginForm" class="space-y-5">
                <!-- Email -->
                <div>
                    <label for="email" class="label-overline block mb-2">Email Address</label>
                    <div class="relative">
                        <i class="far fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none"></i>
                        <input type="email" id="email" name="email" required
                               class="input-modern pl-11" placeholder="name@company.com" autocomplete="email">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="password" class="label-overline">Password</label>
                        <a href="#" class="text-[10px] font-bold uppercase tracking-wider text-indigo-600 dark:text-indigo-400 hover:underline">Forgot?</a>
                    </div>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none"></i>
                        <input type="password" id="password" name="password" required
                               class="input-modern pl-11 pr-11" placeholder="••••••••" autocomplete="current-password">
                        <button type="button" id="togglePw"
                                class="absolute right-3 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-indigo-600 transition">
                            <i class="far fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>

                <div id="errorMessage" class="text-rose-500 text-xs font-bold text-center min-h-[1.25rem]"></div>

                <button type="submit" id="loginButton" class="btn-primary w-full py-4 uppercase tracking-widest">
                    <span id="loginLabel">Sign In</span>
                    <i id="loginSpinner" class="fas fa-circle-notch fa-spin hidden"></i>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-200/50 dark:border-slate-700/50 text-center">
                <p class="text-xs text-slate-500 dark:text-slate-400">
                    Need access? Contact
                    <a href="mailto:it@company.com" class="text-indigo-600 dark:text-indigo-400 font-bold hover:underline">IT Support</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // ===== Theme =====
        const root = document.documentElement;
        const themeIcon = document.getElementById('theme-icon');
        const applyTheme = (t) => {
            root.classList.toggle('dark', t === 'dark');
            themeIcon.className = t === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', t);
        };
        applyTheme(localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
        document.getElementById('theme-toggle').addEventListener('click', () => {
            applyTheme(root.classList.contains('dark') ? 'light' : 'dark');
        });

        // ===== Show/hide password =====
        document.getElementById('togglePw').addEventListener('click', () => {
            const pw = document.getElementById('password');
            const isPw = pw.type === 'password';
            pw.type = isPw ? 'text' : 'password';
            document.querySelector('#togglePw i').className = isPw ? 'far fa-eye-slash text-sm' : 'far fa-eye text-sm';
        });

        // ===== Login =====
        const API_BASE_URL = window.location.origin;
        const loginForm = document.getElementById('loginForm');
        const errorBox  = document.getElementById('errorMessage');
        const btn       = document.getElementById('loginButton');
        const label     = document.getElementById('loginLabel');
        const spinner   = document.getElementById('loginSpinner');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.textContent = '';
            btn.disabled = true;
            label.textContent = 'Signing In…';
            spinner.classList.remove('hidden');

            try {
                const res = await fetch(`${API_BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.message || 'Login failed');
                }
                const { token, user } = await res.json();
                localStorage.setItem('authToken', token);
                localStorage.setItem('user', JSON.stringify(user));
                window.location.href = 'index.html';
            } catch (err) {
                errorBox.textContent = err.message;
                btn.disabled = false;
                label.textContent = 'Sign In';
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
