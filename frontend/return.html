<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return Assets · IT Inventory</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex flex-col antialiased">

    <div class="ambient-bg"></div>

    <!-- Header -->
    <header class="glass border-b border-slate-200/50 dark:border-slate-800/50 p-4 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 rounded-2xl flex items-center justify-center text-white shadow-glow"
                     style="background: var(--gradient-primary);">
                    <i class="fas fa-undo-alt text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-tight">Return Assets</h1>
                    <p class="label-overline text-[9px]">Inventory Recovery</p>
                </div>
            </div>
            <button id="theme-toggle" class="w-11 h-11 flex items-center justify-center rounded-2xl glass text-slate-600 dark:text-slate-300">
                <i id="theme-toggle-dark-icon" class="fas fa-moon"></i>
                <i id="theme-toggle-light-icon" class="fas fa-sun text-amber-400 hidden"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 p-6 md:p-10 w-full max-w-4xl mx-auto flex flex-col justify-center">
        <div class="relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 via-violet-500 to-emerald-500 rounded-[2.5rem] blur-md opacity-20 group-hover:opacity-40 transition duration-700"></div>

            <div class="relative glass-strong p-8 md:p-12 rounded-[2.5rem]">

                <!-- Loading -->
                <div id="loading" class="flex flex-col items-center justify-center py-24 text-slate-500">
                    <div class="relative w-12 h-12 mb-6">
                        <div class="absolute inset-0 border-4 border-indigo-100 dark:border-indigo-900/30 rounded-full"></div>
                        <div class="absolute inset-0 border-4 rounded-full border-t-transparent animate-spin"
                             style="border-color: var(--primary); border-top-color: transparent;"></div>
                    </div>
                    <p class="label-overline">Verifying Transaction…</p>
                </div>

                <!-- Content -->
                <div id="content" class="hidden">
                    <div class="mb-10">
                        <p class="label-overline mb-2">Return Manifest</p>
                        <h2 class="text-3xl md:text-4xl font-black tracking-tight">Confirm Return</h2>
                        <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Review and process item returns</p>
                    </div>

                    <!-- Borrower details -->
                    <div id="returnDetails" class="mb-8 p-7 rounded-3xl relative overflow-hidden text-white"
                         style="background: var(--gradient-primary); box-shadow: var(--shadow-glow);">
                        <div class="absolute -top-6 -right-6 opacity-10">
                            <i class="fas fa-receipt text-[10rem]"></i>
                        </div>
                        <!-- injected -->
                    </div>

                    <h3 class="label-overline mb-4 flex items-center">
                        <span class="w-7 h-7 rounded-lg flex items-center justify-center mr-3 text-white"
                              style="background: var(--gradient-primary);">
                            <i class="fas fa-box-open text-[10px]"></i>
                        </span>
                        Items in this Session
                    </h3>

                    <div id="return-items-list" class="space-y-3 mb-8"></div>

                    <div id="return-actions" class="mt-8 flex flex-col sm:flex-row justify-end gap-3 pt-8 border-t border-slate-200/50 dark:border-slate-700/50"></div>
                </div>

                <!-- Not found -->
                <div id="not-found" class="hidden flex-col items-center justify-center py-20 text-center">
                    <div class="w-24 h-24 rounded-3xl flex items-center justify-center mb-8"
                         style="background: linear-gradient(135deg,#fda4af,#f43f5e); box-shadow: 0 16px 40px -10px rgba(244,63,94,0.4);">
                        <i class="fas fa-exclamation-triangle text-4xl text-white"></i>
                    </div>
                    <h2 class="text-3xl font-black mb-3 tracking-tight">Invalid Transaction</h2>
                    <p class="text-slate-500 dark:text-slate-400 mb-10 max-w-sm mx-auto">
                        We couldn't locate this loan ID. Please verify your receipt or contact IT support.
                    </p>
                    <button onclick="window.location.href='loan.html'" class="btn-primary px-10 py-4">
                        <i class="fas fa-arrow-left"></i> Back to Portal
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Notification Modal -->
    <div id="notificationModal" class="modal opacity-0 pointer-events-none fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/60 p-6 transition-all duration-300">
        <div class="modal-content glass-strong p-10 text-center max-w-sm w-full">
            <div id="modalIcon" class="mb-6 flex justify-center"></div>
            <h3 id="modalTitle" class="text-2xl font-black mb-2 tracking-tight">Alert</h3>
            <p id="modalMessage" class="text-slate-500 dark:text-slate-400 text-sm mb-8"></p>
            <button onclick="closeNotificationAndReload()" class="btn-primary w-full py-4">Acknowledge</button>
        </div>
    </div>

    <script>
      // Theme
      const root = document.documentElement;
      const dIco = document.getElementById('theme-toggle-dark-icon');
      const lIco = document.getElementById('theme-toggle-light-icon');
      const setTheme = (t) => {
          root.classList.toggle('dark', t === 'dark');
          dIco.classList.toggle('hidden', t === 'dark');
          lIco.classList.toggle('hidden', t !== 'dark');
          localStorage.setItem('theme', t);
      };
      setTheme(localStorage.getItem('theme') || 'light');
      document.getElementById('theme-toggle').addEventListener('click', () =>
          setTheme(root.classList.contains('dark') ? 'light' : 'dark'));

      window.closeNotificationAndReload = () => location.reload();
    </script>

    <script type="module">
        const API_BASE_URL = window.location.origin;

        window.addEventListener('load', async () => {
            const loanId = new URLSearchParams(window.location.search).get('id');
            if (!loanId) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('not-found').classList.remove('hidden');
                document.getElementById('not-found').classList.add('flex');
                return;
            }
            try {
                const res = await fetch(`${API_BASE_URL}/api/loans/group/${loanId}`);
                if (!res.ok) throw new Error('Not found');
                const { loanItems, borrower, dueDate } = await res.json();

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');

                document.getElementById('returnDetails').innerHTML += `
                    <div class="relative">
                        <p class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1">Loan ID</p>
                        <p class="text-2xl font-black tracking-tight font-mono mb-4">${loanId}</p>
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <p class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1">Borrower</p>
                                <p class="font-bold text-sm">${borrower || '—'}</p>
                            </div>
                            <div>
                                <p class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1">Due Date</p>
                                <p class="font-bold text-sm">${dueDate || '—'}</p>
                            </div>
                        </div>
                    </div>`;

                document.getElementById('return-items-list').innerHTML = (loanItems || []).map(i => `
                    <div class="card-modern p-4 flex justify-between items-center">
                        <div class="flex items-center gap-3 min-w-0">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white shrink-0"
                                 style="background: var(--gradient-primary);">
                                <i class="fas fa-cube text-sm"></i>
                            </div>
                            <div class="min-w-0">
                                <p class="font-bold text-sm truncate">${i.DeviceSerial || '—'}</p>
                                <p class="text-[11px] text-slate-500 truncate">${i.DeviceType || ''}</p>
                            </div>
                        </div>
                        <span class="status-badge status-active">${i.Status || 'Active'}</span>
                    </div>`).join('') || `<p class="text-center label-overline py-6">No items</p>`;

                document.getElementById('return-actions').innerHTML = `
                    <button onclick="window.location.href='loan.html'" class="btn-ghost px-6 py-3">
                        <i class="fas fa-arrow-left"></i> Cancel
                    </button>
                    <button onclick="confirmReturn('${loanId}')" class="btn-primary px-8 py-3">
                        <i class="fas fa-check-circle"></i> Confirm Return All
                    </button>`;
            } catch (e) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('not-found').classList.remove('hidden');
                document.getElementById('not-found').classList.add('flex');
            }
        });

        window.confirmReturn = async (id) => {
            try {
                const r = await fetch(`${API_BASE_URL}/api/loans/return/${id}`, { method: 'POST' });
                if (!r.ok) throw new Error('Return failed');
                document.getElementById('modalIcon').innerHTML =
                    `<div class="w-20 h-20 rounded-3xl flex items-center justify-center text-white"
                          style="background: linear-gradient(135deg,#10b981,#059669); box-shadow: 0 16px 40px -10px rgba(16,185,129,0.5);">
                        <i class="fas fa-check text-3xl"></i>
                     </div>`;
                document.getElementById('modalTitle').textContent = 'Returned!';
                document.getElementById('modalMessage').textContent = 'All items have been returned successfully.';
                document.getElementById('notificationModal').classList.remove('opacity-0', 'pointer-events-none');
            } catch (e) { alert(e.message); }
        };
    </script>
</body>
</html>
